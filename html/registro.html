<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Farma - Registro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../assets/css/temas.css">
</head>
<body>

    <!-- ============================================ -->
    <!-- NAVBAR SUPERIOR FIJO -->
    <!-- ============================================ -->
    <nav class="top-navbar">
        <span class="brand">
            <img src="../assets/img/logo.png" alt="Logo" class="img-fluid me-2" style="max-height: 30px;">Nova Farma
        </span>
        <div class="user-info">
            <span>Administrador</span>
            <button class="btn btn-sm btn-outline-light d-lg-none" data-bs-toggle="collapse" data-bs-target="#sidebar">
                <i class="bi bi-list"></i>
            </button>
        </div>
    </nav>

    <!-- ============================================ -->
    <!-- SIDEBAR IZQUIERDO -->
    <!-- ============================================ -->
    <aside class="sidebar collapse show" id="sidebar">
        <a href="../index.html" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="alertas.html" class="nav-link">
            <i class="bi bi-exclamation-triangle"></i> Alertas
        </a>
        <a href="inventario.html" class="nav-link">
            <i class="bi bi-box-seam"></i> Inventario
        </a>
        <a href="registro.html" class="nav-link active">
            <i class="bi bi-plus-circle"></i> Registro
        </a>
    </aside>

    <!-- ============================================ -->
    <!-- CONTENIDO PRINCIPAL -->
    <!-- ============================================ -->
    <main class="main-content">

        <h4 class="mb-4">Registro de Operaciones</h4>

        <div class="row g-4">
            
            <!-- FORMULARIO 1: Nuevo Medicamento -->
            <div class="col-lg-6">
                <div class="form-card">
                    <h5 class="mb-3"><i class="bi bi-capsule me-2 text-primary"></i>Nuevo Medicamento</h5>
                    <form action="#" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nombre del medicamento</label>
                            <input type="text" class="form-control" name="nombre" placeholder="Ej. Paracetamol 500mg" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Categoria</label>
                            <select class="form-select" name="categoria" required>
                                <option value="" selected disabled>Seleccionar...</option>
                                <option>Analgesico</option>
                                <option>Antibiotico</option>
                                <option>Antiinflamatorio</option>
                                <option>Antihistaminico</option>
                                <option>Gastroprotector</option>
                                <option>Otro</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Cantidad inicial</label>
                            <input type="number" class="form-control" name="cantidad" min="1" placeholder="0" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Responsable</label>
                            <input type="text" class="form-control" name="responsable" placeholder="Ej. Maria Gonzalez" required>
                        </div>
                        
                        <!-- Boton con data-bs-toggle para modal (sin JS propio) -->
                        <button type="button" class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#modalMedicamento">
                            <i class="bi bi-check-circle me-2"></i>Guardar Medicamento
                        </button>
                    </form>
                </div>
            </div>

            <!-- FORMULARIO 2: Registro de Incidencia -->
            <div class="col-lg-6">
                <div class="form-card">
                    <h5 class="mb-3"><i class="bi bi-exclamation-octagon me-2 text-warning"></i>Registro de Incidencia</h5>
                    <form action="#" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tipo de incidencia</label>
                            <select class="form-select" name="tipoIncidencia" required>
                                <option value="" selected disabled>Seleccionar tipo...</option>
                                <option value="merma">Merma (producto danado)</option>
                                <option value="accidente">Accidente/Rotura</option>
                                <option value="vencido">Producto vencido no registrado</option>
                                <option value="perdida">Perdida/misterio</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre del medicamento afectado</label>
                            <input type="text" class="form-control" name="medicamentoIncidencia" placeholder="Ej. Paracetamol 500mg" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cantidad afectada</label>
                                <input type="number" class="form-control" name="cantidadIncidencia" min="1" placeholder="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Fecha del incidente</label>
                                <input type="date" class="form-control" name="fechaIncidencia" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripcion del incidente</label>
                            <textarea class="form-control" name="descripcionIncidencia" rows="2" placeholder="Describa que ocurrio..." required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Responsable que reporta</label>
                            <input type="text" class="form-control" name="responsableIncidencia" placeholder="Ej. Juan Perez" required>
                        </div>
                        
                        <!-- Boton con data-bs-toggle para modal (sin JS propio) -->
                        <button type="button" class="btn btn-warning w-100" data-bs-toggle="modal" data-bs-target="#modalIncidencia">
                            <i class="bi bi-exclamation-triangle me-2"></i>Registrar Incidencia
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <!-- ============================================ -->
    <!-- MODAL: Confirmacion Medicamento -->
    <!-- ============================================ -->
    <div class="modal fade" id="modalMedicamento" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                    <h5 class="mt-3 mb-2">Registro exitoso</h5>
                    <p class="text-muted mb-4">El medicamento ha sido registrado correctamente.</p>
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- MODAL: Confirmacion Incidencia -->
    <!-- ============================================ -->
    <div class="modal fade" id="modalIncidencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                    <h5 class="mt-3 mb-2">Incidencia registrada</h5>
                    <p class="text-muted mb-4">La incidencia ha sido registrada correctamente.</p>
                    <button type="button" class="btn btn-success" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- JS BUNDLE DE BOOTSTRAP -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
